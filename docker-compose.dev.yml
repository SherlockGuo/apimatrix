# Full Docker development stack with hot reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# Open:
#   Frontend HMR: http://localhost:5173
#   Backend API:  http://localhost:${DEV_API_PORT:-3002}
#
# Notes:
#   - Go changes are rebuilt/restarted by Air inside the new-api container.
#   - Default frontend changes are hot-reloaded by Rsbuild inside web-default.
#   - API calls from the frontend dev server are proxied to the backend service.

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    command: >
      sh -lc '
        mkdir -p web/default/dist web/classic/dist logs &&
        if [ ! -f web/default/dist/index.html ]; then
          printf "%s" "<!doctype html><html><head><title>dev</title></head><body>use frontend dev server</body></html>" > web/default/dist/index.html;
        fi &&
        if [ ! -f web/classic/dist/index.html ]; then
          printf "%s" "<!doctype html><html><head><title>dev</title></head><body>use frontend dev server</body></html>" > web/classic/dist/index.html;
        fi &&
        /go/bin/air -c .air.toml
      '
    ports:
      - "${DEV_API_PORT:-3002}:3000"
    volumes:
      - .:/app
      - ./logs:/app/logs
      - dev_data:/data
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - .env
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - UPDATE_TASK=false
      - NODE_NAME=new-api-dev-node
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-default:
    image: oven/bun:1
    container_name: new-api-dev-web-default
    working_dir: /app/web/default
    command: >
      sh -lc '
        cd /app/web &&
        bun install --frozen-lockfile &&
        cd /app/web/default &&
        export VITE_REACT_APP_SERVER_URL=http://new-api:3000 &&
        export VITE_REACT_APP_VERSION=dev &&
        bun run dev -- --host 0.0.0.0 --port 5173
      '
    ports:
      - "${DEV_WEB_PORT:-5173}:5173"
    volumes:
      - .:/app
      - bun_cache:/root/.bun
      - web_node_modules:/app/web/node_modules
      - web_default_node_modules:/app/web/default/node_modules
    depends_on:
      new-api:
        condition: service_started
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  bun_cache:
  dev_data:
  dev_pg_data:
  go_build_cache:
  go_mod_cache:
  web_default_node_modules:
  web_node_modules:

networks:
  dev-network:
    driver: bridge
